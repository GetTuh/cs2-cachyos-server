---
- name: Create steam group
  ansible.builtin.group:
    name: steam
    system: true
    state: present

- name: Create steam user
  ansible.builtin.user:
    name: steam
    group: steam
    system: true
    shell: /bin/bash
    home: /home/steam
    create_home: true
    state: present

- name: Install yay
  community.general.pacman:
    name: yay
    state: present

- name: Install steamcmd from AUR
  ansible.builtin.command:
    cmd: yay -S --noconfirm --needed steamcmd
    creates: /usr/lib/steamcmd/steamcmd.sh
  become: true
  become_user: steam

- name: Create CS2 install directory
  ansible.builtin.file:
    path: /opt/cs2
    state: directory
    owner: steam
    group: steam
    mode: "0755"
