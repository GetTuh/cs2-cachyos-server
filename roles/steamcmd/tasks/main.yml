---
- name: Create steam group
  ansible.builtin.group:
    name: steam
    system: true
    state: present

- name: Create steam user
  ansible.builtin.user:
    name: steam
    group: steam
    system: true
    shell: /bin/bash
    home: /home/steam
    create_home: true
    state: present

- name: Install steamcmd dependencies
  community.general.pacman:
    name:
      - lib32-gcc-libs
      - lib32-sdl2
      - lib32-dbus
      - curl
    state: present

- name: Create steamcmd directory
  ansible.builtin.file:
    path: /home/steam/steamcmd
    state: directory
    owner: steam
    group: steam
    mode: "0755"

- name: Download and extract steamcmd
  ansible.builtin.unarchive:
    src: https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
    dest: /home/steam/steamcmd
    remote_src: true
    owner: steam
    group: steam
    creates: /home/steam/steamcmd/steamcmd.sh

- name: Create CS2 install directory
  ansible.builtin.file:
    path: /opt/cs2
    state: directory
    owner: steam
    group: steam
    mode: "0755"
