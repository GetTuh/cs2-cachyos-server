---
- name: Create .steam/sdk64 directory for Steamworks SDK
  ansible.builtin.file:
    path: /home/steam/.steam/sdk64
    state: directory
    owner: steam
    group: steam
    mode: "0755"

- name: Symlink steamclient.so for Steamworks SDK
  ansible.builtin.file:
    src: /home/steam/steamcmd/linux64/steamclient.so
    dest: /home/steam/.steam/sdk64/steamclient.so
    state: link
    owner: steam
    group: steam

- name: Download and install CS2 via steamcmd
  ansible.builtin.command:
    cmd: >
      /home/steam/steamcmd/steamcmd.sh
      +force_install_dir /opt/cs2
      +login anonymous
      +app_update 730 validate
      +quit
    creates: /opt/cs2/game/bin/linuxsteamrt64/cs2
  become: true
  become_user: steam

- name: Fix CS2 directory ownership
  ansible.builtin.file:
    path: /opt/cs2
    owner: steam
    group: steam
    recurse: true

- name: Deploy server.cfg
  ansible.builtin.template:
    src: server.cfg.j2
    dest: /opt/cs2/game/csgo/cfg/server.cfg
    owner: steam
    group: steam
    mode: "0644"

- name: Deploy benchmark config
  ansible.builtin.copy:
    dest: /opt/cs2/game/csgo/cfg/benchmark.cfg
    owner: steam
    group: steam
    mode: "0644"
    content: |
      sv_cheats 1
      sv_stressbots 1
      bot_quota 16
      bot_quota_mode fill
      bot_difficulty 0
      fps_max 0
      net_graph 1

- name: Deploy CS2 systemd service
  ansible.builtin.template:
    src: cs2.service.j2
    dest: /etc/systemd/system/cs2.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart cs2

- name: Deploy cs2update script
  ansible.builtin.template:
    src: cs2update.j2
    dest: /usr/local/bin/cs2update
    owner: root
    group: root
    mode: "0755"

- name: Deploy cs2validate script
  ansible.builtin.template:
    src: cs2validate.j2
    dest: /usr/local/bin/cs2validate
    owner: root
    group: root
    mode: "0755"

- name: Enable and start CS2 service
  ansible.builtin.systemd:
    name: cs2
    enabled: true
    state: started
    daemon_reload: true
